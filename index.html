function layout() {
  cy.layout({
    name: 'preset',
    fit: false,
    animate: true,
    animationDuration: 400
  }).run();
  setTimeout(() => {
    cy.center();
    const z = Math.min(cy.zoom(), 1.0);
    cy.zoom(z);
  }, 100);
}

function fit() {
  cy.fit(cy.elements(), 40);
  const z = Math.min(cy.zoom(), 1.0);
  cy.zoom(z);
}

function showNodeDetails(node) {
  const d = node.data();
  const colorBadge = `<span class="badge" style="background:${d.color}33;color:${d.color};border:1px solid ${d.color};">${d.type}</span>`;
  let html = `
    <div class="section">
      <h3>Nodo</h3>
      <div class="row"><span class="label">Nombre</span><span class="value">${d.label}</span></div>
      <div class="row"><span class="label">Tipo</span><span class="value">${colorBadge}</span></div>
      <div class="row"><span class="label">Nivel</span><span class="value">${d.level === 0 ? 'Fuente' : d.level === 2 ? 'Destino' : 'Centro'}</span></div>
      <div class="row"><span class="label">Primera tx</span><span class="value">${d.first_seen?.replace('T',' ').substring(0,16)}</span></div>
      <div class="row"><span class="label">Total txs</span><span class="value">${d.tx_count}</span></div>
    </div>
    <div class="section">
      <h3>Direccion</h3>
      <div class="copy-row">
        <span class="value" style="max-width:100%;text-align:left;font-size:10px;">${d.id}</span>
        <button class="copy-btn" onclick="copyToClipboard('${d.id}')" title="Copiar direccion">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        </button>
      </div>
    </div>
  `;
  // Entrantes / Salientes resumidos
  const outEdges = node.outgoers('edge').map(e => e.data());
  const inEdges = node.incomers('edge').map(e => e.data());
  const totalOut = outEdges.reduce((s, e) => s + e.eth_value, 0);
  const totalIn = inEdges.reduce((s, e) => s + e.eth_value, 0);
  html += `
    <div class="section">
      <h3>Flujo ETH</h3>
      <div class="row"><span class="label">Entrada</span><span class="value">${totalIn.toFixed(4)} ETH</span></div>
      <div class="row"><span class="label">Salida</span><span class="value">${totalOut.toFixed(4)} ETH</span></div>
      <div class="row"><span class="label">Neto</span><span class="value" style="color:${totalIn-totalOut >= 0 ? '#3fb950':'#f85149'}">${(totalIn-totalOut).toFixed(4)} ETH</span></div>
    </div>
  `;
  document.getElementById('detail-panel').innerHTML = html;
}

function showEdgeDetails(edge) {
  const d = edge.data();
  const srcNode = cy.getElementById(d.source);
  const tgtNode = cy.getElementById(d.target);
  const src = srcNode.data('label');
  const tgt = tgtNode.data('label');
  const srcType = srcNode.data('type');
  const tgtType = tgtNode.data('type');
  const srcColor = srcNode.data('color');
  const tgtColor = tgtNode.data('color');

  const srcBadge = `<span class="badge" style="background:${srcColor}33;color:${srcColor};border:1px solid ${srcColor};">${srcType}</span>`;
  const tgtBadge = `<span class="badge" style="background:${tgtColor}33;color:${tgtColor};border:1px solid ${tgtColor};">${tgtType}</span>`;

  // Direcciones completas con copy
  let addrHtml = `
    <div class="section">
      <h3>Direcciones</h3>
      <div class="copy-row">
        <span class="value" style="max-width:100%;text-align:left;font-size:10px;">${d.source}</span>
        <button class="copy-btn" onclick="copyToClipboard('${d.source}')" title="Copiar direccion">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        </button>
      </div>
      <div class="copy-row">
        <span class="value" style="max-width:100%;text-align:left;font-size:10px;">${d.target}</span>
        <button class="copy-btn" onclick="copyToClipboard('${d.target}')" title="Copiar direccion">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        </button>
      </div>
    </div>
  `;

  // Tokens desglosados
  let tokensHtml = '';
  const tokens = d.token_breakdown || {};
  const keys = Object.keys(tokens);
  if (keys.length > 0) {
    tokensHtml = '<div class="section"><h3>Desglose por Token</h3>' +
      keys.map(k => `<div class="token-row"><span>${k}</span><span>${tokens[k].toLocaleString()}</span></div>`).join('') +
      '</div>';
  }

  // Tx hashes con links a Etherscan
  let hashesHtml = '';
  if (d.tx_hashes && d.tx_hashes.length > 0) {
    hashesHtml = '<div class="section"><h3>Tx Hashes</h3>' +
      d.tx_hashes.map(h => `<div class="row"><span class="value" style="max-width:100%;text-align:left;font-size:10px;"><a href="https://etherscan.io/tx/${h}" target="_blank" style="color:#58a6ff;text-decoration:none;">${h}</a></span></div>`).join('') +
      '</div>';
  }

  // Valor ETH + USD prominente
  let valueHtml = '';
  const hasTokens = Object.keys(d.token_breakdown || {}).length > 0;
  if (d.eth_value > 0 || hasTokens) {
    const ethRow = d.eth_value > 0 ? `<div class="row"><span class="label">ETH</span><span class="value">${d.eth_label || d.eth_value.toFixed(4)}</span></div>` : '';
    const usdRow = d.usd_label ? `<div class="row"><span class="label">USD</span><span class="value" style="color:#3fb950;">${d.usd_label}</span></div>` : '';
    valueHtml = `
      <div class="section">
        <h3>Valor Transferido</h3>
        ${ethRow}
        ${usdRow}
        <div class="row"><span class="label">Transacciones</span><span class="value">${d.tx_count}</span></div>
        <div class="row"><span class="label">Primera tx</span><span class="value">${d.first_seen?.replace('T',' ').substring(0,19)} UTC</span></div>
      </div>
    `;
  }

  const html = `
    <div class="section">
      <h3>Flujo de Fondos</h3>
      <div class="row"><span class="label">De</span><span class="value">${src} ${srcBadge}</span></div>
      <div class="row"><span class="label">A</span><span class="value">${tgt} ${tgtBadge}</span></div>
    </div>
    ${valueHtml}
    ${addrHtml}
    ${tokensHtml}
    ${hashesHtml}
  `;
  document.getElementById('detail-panel').innerHTML = html;
}

cy.on('tap', 'node', function(evt) {
  showNodeDetails(evt.target);
});

cy.on('tap', 'edge', function(evt) {
  showEdgeDetails(evt.target);
});

cy.on('tap', function(evt) {
  if (evt.target === cy) {
    document.getElementById('detail-panel').innerHTML = '<div class="empty">Haz click en un nodo o arista para ver detalles</div>';
  }
});

// Centrar al cargar sin comprimir excesivamente
setTimeout(() => {
  cy.center();
  const z = Math.min(cy.zoom(), 1.0);
  cy.zoom(z);
}, 300);

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('toast');
    toast.textContent = 'Address copied';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
  }).catch(() => {
    const toast = document.getElementById('toast');
    toast.textContent = 'Copy failed';
    toast.style.color = '#f85149';
    toast.classList.add('show');
    setTimeout(() => { toast.classList.remove('show'); toast.style.color = '#3fb950'; }, 1500);
  });
}
</script>
<div id="toast">Address copied</div>
</body>
</html>
